services:
  marina:
    build: .
    ports:
      - "3300:3300"   # WebSocket + Web Chat + Dashboard
      - "4000:4000"   # Telnet
      - "3301:3301"   # MCP
    volumes:
      - marina-data:/app/data
    environment:
      - DB_PATH=/app/data/marina.db
      - LOG_FORMAT=json
      # Admin bootstrap: comma-separated entity names for auto-admin on login
      # - MARINA_ADMINS=YourName
      # Optional: Telegram/Discord tokens
      # - TELEGRAM_TOKEN=your_token
      # - DISCORD_TOKEN=your_token
      # - DISCORD_CHANNEL_IDS=channel1,channel2
    restart: unless-stopped

volumes:
  marina-data:
