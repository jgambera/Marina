<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marina Live Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #080c14;
      color: #c8d6e5;
      font-family: "Share Tech Mono", monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    /* Scanline overlay */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
      z-index: 9999;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1a2538; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #5a6a7a; }

    /* Layout */
    .container {
      display: flex;
      flex-direction: column;
      max-width: 960px;
      height: 100vh;
      margin: 0 auto;
      padding: 16px;
    }

    /* Card */
    .card {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      background: linear-gradient(135deg, rgba(13, 20, 32, 0.9), rgba(8, 12, 20, 0.95));
      border: 1px solid #1a2538;
      border-radius: 4px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 15px rgba(0, 255, 231, 0.03),
                  inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #1a2538;
      flex-shrink: 0;
    }

    .title {
      font-family: "Orbitron", sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #00ffe7, #00a8ff, #bf00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: #5a6a7a;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4444;
      box-shadow: 0 0 6px #ff4444;
      transition: all 0.3s ease;
    }

    .status-dot.connected {
      background: #00ffe7;
      box-shadow: 0 0 6px rgba(0, 255, 231, 0.6);
    }

    .viewers {
      color: #5a6a7a;
    }

    /* Log body */
    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      min-height: 0;
    }

    /* Log entry */
    .log-line {
      padding: 1px 0;
      animation: fade-in 0.15s ease-out;
    }

    .ts {
      color: #5a6a7a;
      margin-right: 8px;
    }

    /* Category colors */
    .cat-connection { color: #00ffe7; }
    .cat-movement   { color: #0088ff; }
    .cat-task       { color: #00ff88; }
    .cat-canvas     { color: #bf00ff; }
    .cat-chat       { color: #e8f0f8; }

    /* Empty state */
    .empty {
      color: #5a6a7a;
      text-align: center;
      padding-top: 40px;
      font-size: 12px;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(2px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .log-line { animation: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <span class="title">MARINA LIVE LOG</span>
        <div class="status-bar">
          <span class="viewers" id="viewers"></span>
          <span class="status-dot" id="status-dot"></span>
        </div>
      </div>
      <div class="log-body" id="log-body">
        <div class="empty" id="empty-msg">Connecting...</div>
      </div>
    </div>
  </div>

  <script>
    const logBody = document.getElementById("log-body");
    const emptyMsg = document.getElementById("empty-msg");
    const statusDot = document.getElementById("status-dot");
    const viewersEl = document.getElementById("viewers");
    const DOM_CAP = 2000;
    let autoScroll = true;
    let ws = null;

    // Track auto-scroll: pause when user scrolls up, resume at bottom
    logBody.addEventListener("scroll", () => {
      const atBottom = logBody.scrollHeight - logBody.scrollTop - logBody.clientHeight < 30;
      autoScroll = atBottom;
    });

    function formatTime(ms) {
      const d = new Date(ms);
      const h = String(d.getHours()).padStart(2, "0");
      const m = String(d.getMinutes()).padStart(2, "0");
      const s = String(d.getSeconds()).padStart(2, "0");
      return h + ":" + m + ":" + s;
    }

    function appendEntry(entry) {
      if (emptyMsg) emptyMsg.remove();

      const line = document.createElement("div");
      line.className = "log-line";

      const ts = document.createElement("span");
      ts.className = "ts";
      ts.textContent = formatTime(entry.timestamp);

      const text = document.createElement("span");
      text.className = "cat-" + entry.category;
      text.textContent = entry.text;

      line.appendChild(ts);
      line.appendChild(text);
      logBody.appendChild(line);

      // DOM cap
      while (logBody.children.length > DOM_CAP) {
        logBody.removeChild(logBody.firstChild);
      }

      if (autoScroll) {
        logBody.scrollTop = logBody.scrollHeight;
      }
    }

    function connect() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(proto + "//" + location.host + "/ws");

      ws.onopen = () => {
        statusDot.classList.add("connected");
      };

      ws.onclose = () => {
        statusDot.classList.remove("connected");
        setTimeout(connect, 2000);
      };

      ws.onerror = () => {
        ws.close();
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === "init") {
          // Clear any existing entries
          logBody.innerHTML = "";
          if (msg.entries.length === 0) {
            const el = document.createElement("div");
            el.className = "empty";
            el.id = "empty-msg";
            el.textContent = "Waiting for events...";
            logBody.appendChild(el);
          } else {
            for (const entry of msg.entries) {
              appendEntry(entry);
            }
          }
        } else if (msg.type === "entry") {
          appendEntry(msg.entry);
        } else if (msg.type === "viewers") {
          viewersEl.textContent = msg.count + " watching";
        }
      };
    }

    connect();
  </script>
</body>
</html>
